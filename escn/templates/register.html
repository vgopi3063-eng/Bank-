<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post" enctype="multipart/form-data">
        {%csrf_token%}
         <table>
            {%for i in form %}
            <tr>
                <td>{{i.label}}</td>
                <td>{{i}}</td>
                <td>{{i.error}}</td>
            </tr>
            {% endfor %}
         </table>
         <button type="submit">SUBMIT</button>
    </form>
</body>
</html>
